<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - SpeedMessages</title>
    <style>
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .brand {
            color: #38bdf8;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Animated Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 10px;
            animation: slide 3s ease-in-out infinite;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(150%); }
            100% { transform: translateX(-100%); }
        }

        .status-tag {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="status-tag">Scheduled Maintenance</span>
        <h1>Sorry, <span style="color: #38bdf8;">SpeedMessages</span> is currently under maintenance</h1>
        <p</SpeedMessages is currently under heavy rebuilding, the app got hacked.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <p style="font-size: 0.9rem; margin-top: 20px; opacity: 0.7;">
            Thanks for you patience.
        </p>
    </div>

</body>
</html>
