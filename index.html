<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedMessage v4.0 | Calling Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #008069; --danger: #ea4335; --bg: #f0f2f5; --white: #ffffff; --horizen: #3498db; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 380px; background: var(--white); border-right: 1px solid #d1d7db; display: flex; flex-direction: column; }
        .header { background: #f0f2f5; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d1d7db; min-height: 60px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #dfe5e7; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; border: 1px solid #ddd; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        #user-list { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .list-item:hover { background: #f5f6f6; }
        .list-details { flex: 1; }

        /* Main Chat */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #efe7dd; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { align-self: flex-end; background: #dcf8c6; }
        .theirs { align-self: flex-start; background: white; }

        .footer { padding: 10px; background: #f0f2f5; display: flex; gap: 10px; }
        #msg-input { flex: 1; border: none; padding: 12px; border-radius: 20px; outline: none; }

        /* Call Overlay */
        #call-overlay { position: fixed; inset: 0; background: rgba(11, 20, 26, 0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .call-actions { display: flex; gap: 30px; margin-top: 40px; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .btn-accept { background: #25d366; }
        .btn-decline { background: #ea4335; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .hidden { display: none !important; }
        
        .btn-hz { background: var(--horizen); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn-hz:hover { background: #2980b9; }
    </style>
</head>
<body>

<div id="call-overlay" class="hidden">
    <div class="avatar" id="call-avatar-large" style="width:120px; height:120px; font-size:50px; margin-bottom:20px;">?</div>
    <h2 id="call-name">Username</h2>
    <p id="call-status">Ringing...</p>
    <div class="call-actions">
        <button id="btn-accept" class="btn-call btn-accept">📞</button>
        <button id="btn-decline" class="btn-call btn-decline">❌</button>
    </div>
    <audio id="remote-audio" autoplay></audio>
</div>

<div id="auth-screen">
    <div class="card">
        <h2 style="color: var(--primary)">SpeedMessage v4</h2>
        
        <button class="btn-hz" onclick="syncWithHorizen()">LOGIN WITH HORIZEN ID</button>
        
        <div style="color: #888; font-size: 11px; margin-bottom: 15px;">- OR USE SPEEDMESSAGE ACCOUNT -</div>

        <div id="signup-fields" class="hidden">
            <input type="text" id="nick" placeholder="Nickname">
            <input type="text" id="avatar-input" placeholder="Avatar URL">
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()" id="auth-btn" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Login</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--primary)">Switch Login/Signup</p>
    </div>
</div>

<div id="sidebar" class="hidden">
    <div class="header">
        <div id="my-avatar" class="avatar">?</div>
        <div style="display:flex; gap:10px;">
            <button onclick="createGroup()" style="border:none; background:none; cursor:pointer; font-size:20px;">👥</button>
            <button onclick="logout()" style="border:none; background:none; cursor:pointer; font-size:18px;">🚪</button>
        </div>
    </div>
    <div style="padding:10px;"><input type="text" id="friend-search" placeholder="Add Friend by Nickname..." onkeydown="if(event.key==='Enter') addFriend()" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ddd;"></div>
    <div id="user-list"></div>
</div>

<div id="main-chat" class="hidden">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="chat-avatar" class="avatar">?</div>
            <div>
                <div id="chat-title" style="font-weight:600;">Select a chat</div>
                <div id="chat-type" style="font-size:10px; color:gray;"></div>
            </div>
        </div>
        <div id="chat-actions" class="hidden">
            <button onclick="startCall()" style="border:none; background:none; cursor:pointer; font-size:20px; margin-right:10px;">📞</button>
            <button id="invite-btn" class="hidden" onclick="inviteToGroup()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">+ Invite</button>
        </div>
    </div>
    <div id="chat-box"></div>
    <div class="footer">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()">
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://lxqccstulccnjfmlcyfn.supabase.co', 'sb_publishable_bburuNja_-PtO30MQB1F3A_t5F1wDeT');
    let currentUser = null, activeRoomId = null, isGroup = false;
    let myPeer, currentCall, localStream;

    // --- HORIZEN LOGIN BRIDGE ---
    function syncWithHorizen() {
        // Asks the Master OS (parent window) for credentials
        window.parent.postMessage({ type: 'REQUEST_HORIZEN_AUTH' }, '*');
    }

    window.addEventListener('message', async (event) => {
        if (event.data.type === 'AUTH_TRANSFER') {
            // Received credentials from Horizen OS
            // Note: Since this is a different project, we use the email to sign in
            // For a seamless demo, you may need a shared password or 
            // a logic to auto-create the user if they don't exist in SM yet.
            alert("Linking Horizen Account: " + event.data.email);
            
            // For now, we set the user and bypass the auth screen
            // In a real setup, you'd use a custom login token here
            document.getElementById('email').value = event.data.email;
            document.getElementById('pass').value = "horizen_pass"; // Temporary placeholder
            handleAuth();
        }
    });

    // --- AUTH ---
    function toggleAuth() { document.getElementById('signup-fields').classList.toggle('hidden'); }
    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value, n = document.getElementById('nick').value, av = document.getElementById('avatar-input').value;
        if (!document.getElementById('signup-fields').classList.contains('hidden')) {
            await _supabase.from('profiles').insert([{ id: (await _supabase.auth.getUser()).data.user.id, nickname: n, avatar_url: av }]);
            await _supabase.auth.signUp({ email: e, password: p, options: { data: { display_name: n, avatar_url: av } } });
            alert("Signed up! Now Login.");
        } else {
            const { data, error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if(error) alert(error.message);
        }
    }
    function logout() { _supabase.auth.signOut(); location.reload(); }

    _supabase.auth.onAuthStateChange((ev, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-chat').classList.remove('hidden');
            
            const myAv = document.getElementById('my-avatar');
            const name = currentUser.user_metadata.display_name || "U";
            if(currentUser.user_metadata.avatar_url) myAv.innerHTML = `<img src="${currentUser.user_metadata.avatar_url}">`;
            else myAv.innerText = name[0].toUpperCase();

            initPeer();
            loadSidebar();
            subscribeRealtime();
        }
    });

    // --- CALLING LOGIC (PeerJS) ---
    function initPeer() {
        myPeer = new Peer(currentUser.id.replace(/-/g, ''));
        
        myPeer.on('call', (call) => {
            document.getElementById('call-overlay').classList.remove('hidden');
            document.getElementById('call-name').innerText = "Incoming Call...";
            document.getElementById('btn-accept').classList.remove('hidden');
            
            document.getElementById('btn-accept').onclick = async () => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                handleCallStream(call);
                document.getElementById('btn-accept').classList.add('hidden');
            };

            document.getElementById('btn-decline').onclick = () => {
                call.close();
                endCallUI();
            };
        });
    }

    async function startCall() {
        if (isGroup) return alert("Private calls only!");
        const friendId = activeRoomId.replace(currentUser.id, "").replace("_", "").replace(/-/g, '');
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const call = myPeer.call(friendId, localStream);
            
            document.getElementById('call-overlay').classList.remove('hidden');
            document.getElementById('call-name').innerText = document.getElementById('chat-title').innerText;
            document.getElementById('call-status').innerText = "Ringing...";
            document.getElementById('btn-accept').classList.add('hidden');
            
            handleCallStream(call);

            document.getElementById('btn-decline').onclick = () => {
                call.close();
                endCallUI();
            };
        } catch (err) {
            alert("Please allow microphone access to call!");
        }
    }

    function handleCallStream(call) {
        currentCall = call;
        call.on('stream', (remoteStream) => {
            const audio = document.getElementById('remote-audio');
            audio.srcObject = remoteStream;
            document.getElementById('call-status').innerText = "Connected";
        });
        call.on('close', endCallUI);
    }

    function endCallUI() {
        document.getElementById('call-overlay').classList.add('hidden');
        if(localStream) localStream.getTracks().forEach(track => track.stop());
    }

    // --- SIDEBAR & CHAT ---
    async function loadSidebar() {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        const { data: friends } = await _supabase.from('friendships').select('*, sender:profiles!friendships_user_id_fkey(*), receiver:profiles!friendships_friend_id_fkey(*)').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`);
        const { data: groups } = await _supabase.from('group_members').select('*, groups(*)').eq('user_id', currentUser.id);

        groups?.forEach(g => renderItem(g.groups.name, g.group_id, true, null));
        friends?.forEach(f => {
            const friend = (f.user_id === currentUser.id) ? f.receiver : f.sender;
            if(friend && f.status === 'accepted') renderItem(friend.nickname, [currentUser.id, friend.id].sort().join('_'), false, friend.avatar_url);
            else if(friend && f.friend_id === currentUser.id) renderPending(f);
        });
    }

    function renderItem(name, roomId, isGrp, avatarUrl) {
        const div = document.createElement('div');
        div.className = 'list-item';
        const av = avatarUrl ? `<img src="${avatarUrl}">` : name[0].toUpperCase();
        div.innerHTML = `<div class="avatar">${av}</div><div class="list-details"><b>${name}</b><br><small>${isGrp ? 'Group' : 'Friend'}</small></div>`;
        div.onclick = () => {
            activeRoomId = roomId; isGroup = isGrp;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').innerHTML = av;
            document.getElementById('chat-actions').classList.remove('hidden');
            document.getElementById('invite-btn').classList.toggle('hidden', !isGrp);
            loadMessages();
        };
        document.getElementById('user-list').appendChild(div);
    }

    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*').eq('room_id', activeRoomId).order('created_at', { ascending: true });
        const box = document.getElementById('chat-box'); box.innerHTML = '';
        data?.forEach(m => {
            const d = document.createElement('div'); d.className = `msg ${m.user_id === currentUser.id ? 'mine' : 'theirs'}`;
            d.innerHTML = `${isGroup && m.user_id !== currentUser.id ? `<small style="display:block;color:green">${m.username}</small>` : ''}${m.content}`;
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        await _supabase.from('messages').insert([{ content: i.value, room_id: activeRoomId, user_id: currentUser.id, username: currentUser.user_metadata.display_name }]);
        i.value = '';
    }

    function subscribeRealtime() {
        _supabase.channel('global').on('postgres_changes', { event: '*', schema: 'public' }, () => { loadSidebar(); loadMessages(); }).subscribe();
    }

    async function addFriend() {
        const t = document.getElementById('friend-search').value;
        const { data: p } = await _supabase.from('profiles').select('id').or(`nickname.ilike."${t}",email.ilike."${t}"`).maybeSingle();
        if(p) await _supabase.from('friendships').insert([{ user_id: currentUser.id, friend_id: p.id, status: 'pending' }]);
        document.getElementById('friend-search').value = '';
    }

    function renderPending(f) {
        const div = document.createElement('div'); div.className = 'list-item'; div.style.background = "#fff9c4";
        div.innerHTML = `<b>Request: ${f.sender.nickname}</b> <button onclick="accept('${f.id}')">Accept</button>`;
        document.getElementById('user-list').appendChild(div);
    }
    async function accept(id) { await _supabase.from('friendships').update({status:'accepted'}).eq('id', id); loadSidebar(); }
    
    async function createGroup() {
        const n = prompt("Group Name:"); if(!n) return;
        const { data: g } = await _supabase.from('groups').insert([{ name: n, created_by: currentUser.id }]).select().single();
        await _supabase.from('group_members').insert([{ group_id: g.id, user_id: currentUser.id }]);
        loadSidebar();
    }
    async function inviteToGroup() {
        const n = prompt("Friend's Nickname:"); if(!n) return;
        const { data: p } = await _supabase.from('profiles').select('id').ilike('nickname', n).maybeSingle();
        if(p) await _supabase.from('group_members').insert([{ group_id: activeRoomId, user_id: p.id }]);
    }
</script>
</body>
</html>
