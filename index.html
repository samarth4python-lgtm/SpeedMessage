<!DOCTYPE html>
<html>
<head>
    <title>SpeedMessage Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #075e54; --light-green: #dcf8c6; --bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; background: #dadbd3; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #ededed; border-bottom: 1px solid #ddd; }
        #chat-main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: var(--light-green); border-top-right-radius: 0; }
        .msg.them { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .friend-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #auth-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; width: 80%; }
        button { padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div style="text-align:center; width: 350px; background: #f9f9f9; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color:var(--primary)">SpeedMessage</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <button onclick="handleAuth()">Start Chatting</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <input type="text" id="targetEmail" placeholder="Add friend email..." style="width: 65%; margin:0;">
        <button onclick="addFriend()">Add</button>
    </div>
    <div id="friend-list"></div>
</div>

<div id="chat-main">
    <div id="messages"></div>
    <div style="padding:15px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="msgInput" style="flex-grow:1; margin:0;" placeholder="Type a message...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
    const S_URL = 'https://spbjbpimophqzzezntkc.supabase.co';
    const S_KEY = 'sb_publishable_sWSccX8FGoKVApt7fQ65Fg_deBNwZ2G';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let myEmail = null, activeChat = null;

    async function handleAuth() {
        const email = document.getElementById('email').value, password = document.getElementById('pass').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            const { data: sData, error: sErr } = await _supabase.auth.signUp({ email, password });
            if (sErr) return alert(sErr.message);
            myEmail = sData.user.email;
        } else { myEmail = data.user.email; }
        document.getElementById('auth-overlay').style.display = 'none';
        init();
    }

    function init() {
        loadFriends();
        // Realtime for friends
        _supabase.channel('friends').on('postgres_changes', {event:'*', schema:'public', table:'friends'}, loadFriends).subscribe();
        // Realtime for messages
        _supabase.channel('msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, payload => {
            const m = payload.new;
            if ((m.username === activeChat && m.receiver === myEmail) || (m.username === myEmail && m.receiver === activeChat)) {
                addMsgUI(m);
            }
        }).subscribe();
    }

    async function addFriend() {
        const target = document.getElementById('targetEmail').value;
        if(!target) return;
        await _supabase.from('friends').insert([{ sender_email: myEmail, receiver_email: target, status: 'pending' }]);
        document.getElementById('targetEmail').value = '';
    }

    async function loadFriends() {
        const { data } = await _supabase.from('friends').select('*').or(`sender_email.eq.${myEmail},receiver_email.eq.${myEmail}`);
        const list = document.getElementById('friend-list');
        list.innerHTML = '';
        data.forEach(f => {
            const other = f.sender_email === myEmail ? f.receiver_email : f.sender_email;
            const item = document.createElement('div');
            item.className = 'friend-item';
            if (f.status === 'pending' && f.receiver_email === myEmail) {
                item.innerHTML = `<span>${other}</span><button onclick="accept('${f.id}')" style="background:#25d366; font-size:10px;">Accept</button>`;
            } else {
                item.innerHTML = `<span>${other}</span><span style="font-size:10px; color:#999;">${f.status}</span>`;
                if (f.status === 'accepted') item.onclick = () => { activeChat = other; loadHistory(); };
            }
            list.appendChild(item);
        });
    }

    async function accept(id) { await _supabase.from('friends').update({ status: 'accepted' }).eq('id', id); }

    async function loadHistory() {
        document.getElementById('messages').innerHTML = `<div style="text-align:center; color:#666; font-size:12px; margin-bottom:10px;">Chatting with ${activeChat}</div>`;
        const { data } = await _supabase.from('messages').select('*')
            .or(`and(username.eq.${myEmail},receiver.eq.${activeChat}),and(username.eq.${activeChat},receiver.eq.${myEmail})`)
            .order('created_at', { ascending: true });
        data.forEach(addMsgUI);
    }

    async function sendMsg() {
        const text = document.getElementById('msgInput').value;
        if (!text || !activeChat) return;
        await _supabase.from('messages').insert([{ content: text, username: myEmail, receiver: activeChat }]);
        document.getElementById('msgInput').value = '';
    }

    function addMsgUI(m) {
        const box = document.getElementById('messages'), div = document.createElement('div');
        div.className = m.username === myEmail ? 'msg me' : 'msg them';
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `${m.content} <span style="font-size:9px; display:block; text-align:right; opacity:0.5; margin-top:4px;">${time}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
