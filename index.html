<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedMessage Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-dark: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --accent: #238636;
            --msg-me: #238636;
            --msg-them: #21262d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
            display: flex; height: 100vh; margin: 0; overflow: hidden; 
        }

        /* Auth Overlay */
        #auth-overlay { 
            position: fixed; inset: 0; background: var(--bg-dark); 
            display: flex; align-items: center; justify-content: center; z-index: 1000; 
        }
        .auth-card { 
            background: var(--sidebar-dark); padding: 40px; border-radius: 12px; 
            border: 1px solid var(--border); text-align: center; width: 320px; 
        }

        /* Sidebar */
        #sidebar { 
            width: 300px; background: var(--sidebar-dark); 
            border-right: 1px solid var(--border); display: none; flex-direction: column; 
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        #friend-list { flex-grow: 1; overflow-y: auto; }
        .friend-item { 
            padding: 15px 20px; border-bottom: 1px solid var(--border); 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .friend-item:hover { background: #21262d; }
        .friend-item.active { border-left: 4px solid var(--accent); background: #1c2128; }

        /* Chat Window */
        #chat-main { flex-grow: 1; display: none; flex-direction: column; background: var(--bg-dark); }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { 
            max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; 
            line-height: 1.4; word-wrap: break-word; position: relative;
        }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* Controls */
        input { 
            background: #0d1117; border: 1px solid var(--border); color: white; 
            padding: 10px; border-radius: 6px; outline: none; width: 100%; box-sizing: border-box;
        }
        button { 
            background: var(--accent); color: white; border: none; padding: 10px 15px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .github-btn { 
            background: #21262d; border: 1px solid var(--border); margin-top: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
        }

        .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin-top:0;">SpeedMessage</h2>
        <p style="color:#8b949e; font-size: 14px;">Connect with your team instantly.</p>
        <button class="github-btn" onclick="loginWithGitHub()">
            <svg height="20" viewBox="0 0 16 16" width="20" style="fill:white"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            Continue with GitHub
        </button>
        <div id="status-msg" style="font-size:12px; margin-top:15px; color:#f85149;"></div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <div style="font-size: 12px; margin-bottom: 10px; color: #8b949e;" id="my-email"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="targetEmail" placeholder="Friend's email...">
            <button onclick="addFriend()">+</button>
        </div>
    </div>
    <div id="friend-list"></div>
    <button onclick="logout()" style="background:transparent; color:#f85149; border-top:1px solid var(--border); border-radius:0;">Sign Out</button>
</div>

<div id="chat-main">
    <div id="messages"></div>
    <div style="padding:20px; border-top: 1px solid var(--border); display:flex; gap:10px;">
        <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
    const S_URL = 'https://spbjbpimophqzzezntkc.supabase.co';
    const S_KEY = 'sb_publishable_sWSccX8FGoKVApt7fQ65Fg_deBNwZ2G';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let myEmail = null, activeChat = null;

    // Detect Session
    _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            myEmail = session.user.email;
            init();
        }
    });

    async function loginWithGitHub() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'github',
            options: { redirectTo: window.location.href }
        });
        if (error) document.getElementById('status-msg').innerText = error.message;
    }

    function init() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('chat-main').style.display = 'flex';
        document.getElementById('my-email').innerText = myEmail;
        
        loadFriends();
        
        // Listen for Friend/Message changes
        _supabase.channel('public:friends').on('postgres_changes', {event:'*', schema:'public', table:'friends'}, loadFriends).subscribe();
        _supabase.channel('public:messages').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, payload => {
            const m = payload.new;
            if ((m.username === activeChat && m.receiver === myEmail) || (m.username === myEmail && m.receiver === activeChat)) {
                addMsgUI(m);
            }
        }).subscribe();
    }

    async function addFriend() {
        const target = document.getElementById('targetEmail').value;
        if(!target || target === myEmail) return;
        await _supabase.from('friends').insert([{ sender_email: myEmail, receiver_email: target, status: 'pending' }]);
        document.getElementById('targetEmail').value = '';
        alert("Request sent to " + target);
    }

    async function loadFriends() {
        const { data } = await _supabase.from('friends').select('*').or(`sender_email.eq.${myEmail},receiver_email.eq.${myEmail}`);
        const list = document.getElementById('friend-list');
        list.innerHTML = '';
        data.forEach(f => {
            const other = f.sender_email === myEmail ? f.receiver_email : f.sender_email;
            const item = document.createElement('div');
            item.className = 'friend-item' + (activeChat === other ? ' active' : '');
            
            if (f.status === 'pending' && f.receiver_email === myEmail) {
                item.innerHTML = `<span>${other}</span><button onclick="accept('${f.id}')" style="font-size:10px; padding:4px 8px;">Accept</button>`;
            } else {
                item.innerHTML = `<span><span class="status-dot"></span>${other}</span><small style="color:#8b949e">${f.status}</small>`;
                if (f.status === 'accepted') item.onclick = () => { activeChat = other; loadHistory(); loadFriends(); };
            }
            list.appendChild(item);
        });
    }

    async function accept(id) { await _supabase.from('friends').update({ status: 'accepted' }).eq('id', id); }

    async function loadHistory() {
        const box = document.getElementById('messages');
        box.innerHTML = `<div style="text-align:center; color:#8b949e; font-size:12px; margin-bottom:20px;">Chatting with ${activeChat}</div>`;
        const { data } = await _supabase.from('messages').select('*')
            .or(`and(username.eq.${myEmail},receiver.eq.${activeChat}),and(username.eq.${activeChat},receiver.eq.${myEmail})`)
            .order('created_at', { ascending: true });
        data.forEach(addMsgUI);
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value;
        if (!text || !activeChat) return;
        await _supabase.from('messages').insert([{ content: text, username: myEmail, receiver: activeChat }]);
        input.value = '';
    }

    function addMsgUI(m) {
        const box = document.getElementById('messages'), div = document.createElement('div');
        div.className = m.username === myEmail ? 'msg me' : 'msg them';
        div.innerText = m.content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function logout() {
        await _supabase.auth.signOut();
        location.reload();
    }
</script>
</body>
</html>
